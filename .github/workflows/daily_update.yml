name: 일일 KOSPI200 배치 갱신

on:
  schedule:
    # 22:00 UTC = 07:00 KST (다음날). GitHub Actions cron은 UTC 기준.
    - cron: '0 22 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: KOSPI200 200종목 배치 재실행 (유니버스/시총 재조회 포함)
        run: python batch_main.py --refresh-universe

      - name: 변경사항 있으면 commit + push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/kospi200.csv output/
          if git diff --cached --quiet; then
            echo "변경된 내용 없음, 커밋 생략"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "일일 자동 갱신 $(date +'%Y-%m-%d')"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Render 배포 트리거
        # Render가 이 저장소에 GitHub App/웹훅으로 연결돼 있지 않아 Auto-Deploy(On Commit)가
        # 실제로는 발동하지 않는 걸 확인함 -> Deploy Hook URL을 직접 호출해서 배포를 건다.
        if: steps.commit.outputs.changed == 'true'
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
